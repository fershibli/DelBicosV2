name: Build, Push e Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build e Push para Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Criar .env para o build
        run: |
          cat > .env << EOF
          EXPO_PUBLIC_ENVIRONMENT=production
          EXPO_PUBLIC_DOMAIN_ANDROID=${{ secrets.EXPO_PUBLIC_DOMAIN_ANDROID }}
          EXPO_PUBLIC_DOMAIN_IOS=${{ secrets.EXPO_PUBLIC_DOMAIN_IOS }}
          EXPO_PUBLIC_PORT=${{ secrets.EXPO_PUBLIC_PORT }}
          EXPO_PUBLIC_HTTP_PROTOCOL=https
          EXPO_PUBLIC_WS_PROTOCOL=wss
          EXPO_PUBLIC_UNSPLASH_API_KEY=${{ secrets.EXPO_PUBLIC_UNSPLASH_API_KEY }}
          EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          EXPO_PUBLIC_GOOGLE_MAPS_API_KEY=${{ secrets.EXPO_PUBLIC_GOOGLE_MAPS_API_KEY }}
          EXPO_PUBLIC_LOCATIONIQ_API_KEY=${{ secrets.EXPO_PUBLIC_LOCATIONIQ_API_KEY }}
          EXPO_PUBLIC_GOOGLE_ANALYTICS_ID=${{ secrets.EXPO_PUBLIC_GOOGLE_ANALYTICS_ID }}
          EXPO_PUBLIC_CLARITY_ID=${{ secrets.EXPO_PUBLIC_CLARITY_ID }}
          EOF

      - name: Build e Push da imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/delbicos-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/delbicos-frontend:${{ github.sha }}

  deploy:
    name: Deploy na EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Copiar docker-compose.prod.yml para a EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "/home/ec2-user/delbicos-frontend"

      - name: Deploy via SSH na EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/delbicos-frontend

            cat > .env << EOF
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            EXPO_PUBLIC_ENVIRONMENT=production
            EXPO_PUBLIC_DOMAIN_ANDROID=${{ secrets.EXPO_PUBLIC_DOMAIN_ANDROID }}
            EXPO_PUBLIC_DOMAIN_IOS=${{ secrets.EXPO_PUBLIC_DOMAIN_IOS }}
            EXPO_PUBLIC_PORT=${{ secrets.EXPO_PUBLIC_PORT }}
            EXPO_PUBLIC_HTTP_PROTOCOL=https
            EXPO_PUBLIC_WS_PROTOCOL=wss
            EXPO_PUBLIC_UNSPLASH_API_KEY=${{ secrets.EXPO_PUBLIC_UNSPLASH_API_KEY }}
            EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
            EXPO_PUBLIC_GOOGLE_MAPS_API_KEY=${{ secrets.EXPO_PUBLIC_GOOGLE_MAPS_API_KEY }}
            EXPO_PUBLIC_LOCATIONIQ_API_KEY=${{ secrets.EXPO_PUBLIC_LOCATIONIQ_API_KEY }}
            EXPO_PUBLIC_GOOGLE_ANALYTICS_ID=${{ secrets.EXPO_PUBLIC_GOOGLE_ANALYTICS_ID }}
            EXPO_PUBLIC_CLARITY_ID=${{ secrets.EXPO_PUBLIC_CLARITY_ID }}
            EOF

            docker network create delbicos-shared-network 2>/dev/null || true
            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml up -d --force-recreate
            docker image prune -f